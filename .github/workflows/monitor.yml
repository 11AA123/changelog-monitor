name: Changelog Monitor

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 UTC 00:00 = JST 09:00
  workflow_dispatch:        # GitHub の画面から手動実行も可能

permissions:
  contents: write           # last_seen.json をコミットし直すために必要

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm start

      - name: Save last_seen.json to repository
        run: |
          if [ ! -f last_seen.json ]; then exit 0; fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update last_seen.json [skip ci]"
          git push
